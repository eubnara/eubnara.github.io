baseURL: 'https://eubnara.github.io/'
title: "EUB's second brain"
theme: 'PaperMod'
defaultContentLanguage: en
defaultContentLanguageInSubdir: false

params:
  author:
    name: eubnara
  comments: true
  env: production
  social: true

languages:
  en:
    languageCode: en-us
    languageName: English
    contentDir: content/en
    weight: 1
    menu:
      main:
        - name: About
          url: about
          weight: 5
        - name: Archive
          url: archives
          weight: 5
        - name: Search
          url: search/
          weight: 10
        - identifier: categories
          name: categories
          url: /categories/
          weight: 10
        - identifier: tags
          name: tags
          url: /tags/
          weight: 20
  ko:
    languageCode: ko-kr
    languageName: 한국어
    contentDir: content/ko
    weight: 2
    menu:
      main:
        - name: 소개
          url: about
          weight: 5
        - name: 글모음
          url: archives
          weight: 5
        - name: 검색
          url: search/
          weight: 10
        - identifier: categories
          name: 분류
          url: /categories/
          weight: 10
        - identifier: tags
          name: 태그
          url: /tags/
          weight: 20

outputs:
    home:
        - HTML
        - RSS
        - JSON
